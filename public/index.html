<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#173d28"><title>EVA Homestead Checklist</title><link rel="stylesheet" href="/styles.css"></head><body>
<header><div><small>EVA HOMESTEAD OPERATIONS</small><h1>Asset Move Checklist</h1></div><button id="refresh">↻</button></header>
<main>
<section class="controls"><label>Deployment<select id="deployment"><option value="alpha">Deployment Alpha</option><option value="bravo">Deployment Bravo</option></select></label><label>Search<input id="search" type="search" placeholder="Victron, tent, chainsaw…"></label></section>
<section id="summary" class="summary"></section><section id="warning" class="warning hidden"></section>
<section class="filters"><select id="subsystem"><option value="">All subsystems</option></select><select id="priority"><option value="">All priorities</option><option value="critical">Critical</option><option value="should_take">Should take</option><option value="bravo">Bravo</option></select><select id="status"><option value="">All statuses</option><option value="not_located">Not located</option><option value="located">Located</option><option value="bundled">Bundled</option><option value="loaded">Loaded</option><option value="delivered">Delivered</option></select></section>
<section class="toolbar"><span id="count">Loading…</span><button id="add">+ Add item</button></section><section id="list"></section>
</main>
<dialog id="dialog"><form id="form"><h2>Add item</h2><label>Name<input id="name" required></label><label>Subsystem<select id="newSubsystem"></select></label><label>Priority<select id="newPriority"><option value="critical">Critical</option><option value="should_take" selected>Should take</option><option value="bravo">Bravo</option></select></label><label>Quantity<input id="quantity" type="number" min="1" value="1"></label><label>Unit<input id="unit" value="item"></label><label>Notes<textarea id="notes"></textarea></label><div class="dialog-actions"><button type="button" id="cancel">Cancel</button><button type="submit">Add</button></div><p id="formError"></p></form></dialog>
<script src="/app.js" defer></script></body></html>
